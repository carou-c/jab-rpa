syntax = "proto3";

package jab;

service JabService {
  rpc ListJavaWindows (Empty) returns (RepeatedWindowInfo);
  rpc SelectWindow (WindowInfo) returns (Empty);
  rpc RefreshTree (Empty) returns (Empty);
  rpc GetVersionInfo (Empty) returns (VersionInfo);
  rpc FindElements (Locator) returns (RepeatedElement);
  rpc FindElement (Locator) returns (Element);
  rpc GetElementFromHandle (ElementHandle) returns (Element);
  rpc AccessibleClick (Element) returns (Empty);
  rpc GetElementText (Element) returns (Text);
  rpc GetElementActions (Element) returns (Actions);
  rpc DoActionOnElement (DoActionRequest) returns (Empty);
  // rpc SubscribeCallbacks(SubscribeCallbacksRequest) returns (stream CallbackEvent);
}

message Empty {}

message Text {
  string text = 1;
}

message Action {
  string name = 1;
}

message Actions {
  repeated Action actions = 1;
}

message DoActionRequest {
  Element element = 1;
  Action action = 2;
}

message WindowInfo {
  uint64 hwnd = 1;
  string title = 2;
}

message RepeatedWindowInfo {
  repeated WindowInfo windows = 1;
}

message Locator {
  string selector = 1;
}

message Element {
  uint64 handle = 1;
  string name = 2;
  string role = 3;
  repeated string states = 4;
  repeated string states_en_us = 5;
  string description = 6;
  repeated uint64 children_handles = 7;
  int32 x = 8;
  int32 y = 9;
  int32 width = 10;
  int32 height = 11;
  bool accessible_action = 12;
  bool accessible_text = 13;
  bool accessible_selection = 14;
  int32 children_count = 15;
  int32 index_in_parent = 16;
  optional uint64 parent_handle = 17;
  int32 depth = 18;
}

message RepeatedElement {
  repeated Element elements = 1;
}

message ElementHandle {
  uint64 handle = 1;
}

message VersionInfo {
  string vm_version = 1;
  string bridge_java_class_version = 2;
  string bridge_java_dll_version = 3;
  string bridge_win_dll_version = 4;
}
