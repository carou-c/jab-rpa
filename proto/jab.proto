syntax = "proto3";

package jab;

service JabService {
  rpc ListJavaWindows(ListJavaWindowsRequest) returns (ListJavaWindowsResponse);
  rpc SelectWindow(SelectWindowRequest) returns (SelectWindowResponse);
  rpc RefreshTree(RefreshTreeRequest) returns (RefreshTreeResponse);
  rpc FindElements(FindElementsRequest) returns (FindElementsResponse);
  rpc GetElementFromHandle(GetElementFromHandleRequest) returns (GetElementFromHandleResponse);
  rpc ClickElement(ClickElementRequest) returns (ClickElementResponse);
  rpc TypeText(TypeTextRequest) returns (TypeTextResponse);
  rpc ReadTable(ReadTableRequest) returns (ReadTableResponse);
  rpc WaitUntilElementExists(WaitUntilElementExistsRequest) returns (WaitUntilElementExistsResponse);
  rpc GetVersionInfo(GetVersionInfoRequest) returns (GetVersionInfoResponse);
  // rpc SubscribeCallbacks(SubscribeCallbacksRequest) returns (stream CallbackEvent);
}

message ListJavaWindowsRequest {}

message WindowInfo {
  uint64 hwnd = 1;
  string title = 2;
}

message ListJavaWindowsResponse {
  repeated WindowInfo windows = 1;
}

message SelectWindowRequest {
  WindowInfo window_info = 1;
}

message SelectWindowResponse {
  bool success = 1;
  string error_message = 2;
}

message RefreshTreeRequest {
}

message RefreshTreeResponse {
  bool success = 1;
  string error_message = 2;
}

message FindElementsRequest {
  Locator locator = 1;
}

message Element {
  uint64 handle = 1;
  string name = 2;
  string role = 3;
  repeated string states = 4;
  repeated string states_en_us = 5;
  string description = 6;
  string text = 7;
  int32 x = 8;
  int32 y = 9;
  int32 width = 10;
  int32 height = 11;
  bool accessible_action = 12;
  bool accessible_text = 13;
  bool accessible_selection = 14;
  int32 children_count = 15;
  int32 index_in_parent = 16;
  repeated uint64 children_handles = 17;
  optional uint64 parent_handle = 18;
  int32 depth = 19;
}

message StringLocator {
  string find = 1;
  bool regex = 2;
}

message IndexLocator {
  int32 index = 1;
}

message AscendantLocator {
  Locator locator = 1;
  bool is_parent = 2;
}

message DescendantLocator {
  Locator locator = 1;
  bool is_child = 2;
}

message Locator {
  optional StringLocator name = 1;
  optional StringLocator role = 2;
  optional StringLocator description = 3;
  optional StringLocator text = 4;
  repeated string has_state = 5;
  repeated string not_has_state = 6;
  optional IndexLocator index_in_parent = 7;
  optional AscendantLocator ascendant = 8;
  repeated DescendantLocator descendants = 9;
}

message FindElementsResponse {
  repeated Element elements = 1;
  string error_message = 2;
}

message GetElementFromHandleRequest {
  uint64 handle = 1;
}

message GetElementFromHandleResponse {
  Element element = 1;
  string error_message = 2;
}

message ClickElementRequest {
  uint64 handle = 1;
}

message ClickElementResponse {
  bool success = 1;
  string error_message = 2;
}

message TypeTextRequest {
  uint64 handle = 1;
  string text = 2;
}

message TypeTextResponse {
  bool success = 1;
  string error_message = 2;
}

message ReadTableRequest {
  string locator = 1;
}

message TableCell {
  string value = 1;
  int32 row = 2;
  int32 column = 3;
}

message TableRow {
  repeated TableCell cells = 1;
}

message Table {
  int32 row_count = 1;
  int32 column_count = 2;
  repeated TableRow rows = 3;
  repeated string column_headers = 4;
}

message ReadTableResponse {
  Table table = 1;
  string error_message = 2;
}

message WaitUntilElementExistsRequest {
  string locator = 1;
  int32 timeout_seconds = 2;
}

message WaitUntilElementExistsResponse {
  bool exists = 1;
  string error_message = 2;
}

message GetVersionInfoRequest {}

message VersionInfo {
  string vm_version = 1;
  string bridge_java_class_version = 2;
  string bridge_java_dll_version = 3;
  string bridge_win_dll_version = 4;
}

message GetVersionInfoResponse {
  VersionInfo version_info = 1;
  string error_message = 2;
}

