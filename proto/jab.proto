syntax = "proto3";

package jab;

service JabService {
  rpc ListJavaWindows (Empty) returns (RepeatedWindowInfo);
  rpc SelectWindow (WindowInfo) returns (Empty);
  rpc GetSelectedWindowHwnd (Empty) returns (Hwnd);
  rpc RefreshTree (Empty) returns (Empty);
  rpc GetVersionInfo (Empty) returns (VersionInfo);
  rpc WaitFor (Locator) returns (Empty);
  rpc Race (RaceRequest) returns (RaceResponse);
  rpc GetInfo (Locator) returns (AccessibleInfo);
  rpc GetInfoFromAll (Locator) returns (RepeatedAccessibleInfo);
  rpc GetText (Locator) returns (Text);
  rpc GetActions (Locator) returns (Actions);
  rpc DoAction (DoActionRequest) returns (Empty);
}

message Empty {}

message Text {
  string text = 1;
}

message Action {
  string name = 1;
}

message Actions {
  repeated Action actions = 1;
}

message DoActionRequest {
  Locator locator = 1;
  Action action = 2;
}

message WindowInfo {
  uint64 hwnd = 1;
  string title = 2;
}

message RepeatedWindowInfo {
  repeated WindowInfo windows = 1;
}

message VersionInfo {
  string vm_version = 1;
  string bridge_java_class_version = 2;
  string bridge_java_dll_version = 3;
  string bridge_win_dll_version = 4;
}

message Hwnd {
  uint64 hwnd = 1;
}

message Locator {
  string selector = 1;
  // None=default
  // 0=fail fast
  // >0=max wait
  optional uint64 timeout_ms = 2;
  // Do refresh_tree after timeout and check a last time
  bool refresh_before_fail = 3;
}

message AccessibleInfo {
  string name = 1;
  string role = 2;
  repeated string states = 3;
  repeated string states_en_us = 4;
  string description = 5;
  int32 x = 6;
  int32 y = 7;
  int32 width = 8;
  int32 height = 9;
  bool accessible_action = 10;
  bool accessible_text = 11;
  bool accessible_selection = 12;
  int32 children_count = 13;
  int32 index_in_parent = 14;
  int32 depth = 15;
}

message RepeatedAccessibleInfo {
  repeated AccessibleInfo ac_infos = 1;
}

message RaceRequest {
  repeated string selectors = 1;
  // None=default
  // 0=fail fast
  // >0=max wait
  optional uint64 timeout_ms = 2;
  // Do refresh_tree after timeout and check a last time
  bool refresh_before_fail = 3;
}

message RaceResponse {
  uint32 winner = 1;
}

